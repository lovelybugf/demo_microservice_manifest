apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: onlineboutique-rbac
  namespace: argocd
spec:
  project: onlineboutique
  source:
    repoURL: https://github.com/lovelybugf/demo_microservice_manifest.git
    targetRevision: main
    path: rbac
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

