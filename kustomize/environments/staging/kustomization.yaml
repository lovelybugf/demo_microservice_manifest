apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: onlineboutique-staging

labels:
  - pairs:
      app.kubernetes.io/part-of: onlineboutique
      app.kubernetes.io/managed-by: kustomize
      env: staging

replicas:
  - name: adservice
    count: 1
  - name: cartservice
    count: 2
  - name: checkoutservice
    count: 2
  - name: currencyservice
    count: 2
  - name: emailservice
    count: 1
  - name: frontend
    count: 2
  - name: loadgenerator
    count: 0
  - name: paymentservice
    count: 2
  - name: productcatalogservice
    count: 2
  - name: recommendationservice
    count: 2
  - name: shippingservice
    count: 2

